# GitHub Pages デプロイ
# 送信先はリポジトリ内の config.js（エンコード済み）をそのまま使う。
# Secrets の古いURLで上書きしない（上書きが原因でフォームが旧エンドポイントに向かう事故を防止）。

name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare site files
        run: |
          test -f config.js
          mkdir -p _site/images
          cp index.html style.css main.js config.js _site/
          if [ -d images ]; then cp -r images/* _site/images/ || true; fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
